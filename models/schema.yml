version: 2

sources:
  - name: raw
    database: proje1-493409
    schema: gz_raw_data

    tables:
      - name: sales
        identifier: raw_gz_sales
        description: sales of Greenweez / we have one row per product_id found in each orders_id
        columns:
          - name: date_date
            description: date of purchase
          - name: orders_id
            description: Unique order identifier
          - name: pdt_id
            description: Product identifier
          - name: revenue
            description: Revenue generated by the order
          - name: quantity
            description: Quantity of products sold
        tests:
          - unique:
              column_name: "(orders_id || '-' || pdt_id)"

      - name: product
        identifier: raw_gz_product
        description: Products of Greenweez
        columns:
          - name: products_id
            description: Primary Key
            tests:
              - unique
              - not_null
          - name: purchase_price
            description: Purchase price of the product

      - name: ship
        identifier: raw_gz_ship
        description: Raw shipping data for the Greenweez orders
        columns:
          - name: orders_id
            description: Primary Key
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: Shipping fee charged to the customer
          - name: logcost
            description: Logistics cost related to shipping
          - name: ship_cost
            description: Shipping cost for each order paid by the company

      - name: adwords
        identifier: raw_gz_adwords
        description: Adwords campaigns
        columns:
          - name: date_date
            description: Campaign date
          - name: paid_source
            description: Advertising platform
          - name: campaign_key
            description: Campaign identifier
          - name: camPGN_name
            description: Campaign name
          - name: ads_cost
            description: Advertising cost
          - name: impression
            description: Number of impressions
          - name: click
            description: Number of clicks

      - name: bing
        identifier: raw_gz_bing
        description: Bing campaigns
        columns:
          - name: date_date
            description: Campaign date
          - name: paid_source
            description: Advertising platform
          - name: campaign_key
            description: Campaign identifier
          - name: camPGN_name
            description: Campaign name
          - name: ads_cost
            description: Advertising cost
          - name: impression
            description: Number of impressions
          - name: click
            description: Number of clicks

      - name: criteo
        identifier: raw_gz_criteo
        description: Criteo campaigns
        columns:
          - name: date_date
            description: Campaign date
          - name: paid_source
            description: Advertising platform
          - name: campaign_key
            description: Campaign identifier
          - name: camPGN_name
            description: Campaign name
          - name: ads_cost
            description: Advertising cost
          - name: impression
            description: Number of impressions
          - name: click
            description: Number of clicks

      - name: facebook
        identifier: raw_gz_facebook
        description: Facebook campaigns
        columns:
          - name: date_date
            description: Campaign date
          - name: paid_source
            description: Advertising platform
          - name: campaign_key
            description: Campaign identifier
          - name: camPGN_name
            description: Campaign name
          - name: ads_cost
            description: Advertising cost
          - name: impression
            description: Number of impressions
          - name: click
            description: Number of clicks


models:
  - name: int_campaigns
    description: "All advertising campaign data combined from Adwords, Bing, Criteo and Facebook."
    columns:
      - name: date_date
        description: "Date of the campaign performance."
        tests:
          - not_null

      - name: paid_source
        description: "Advertising platform."
        tests:
          - not_null

      - name: campaign_key
        description: "Campaign identifier."
        tests:
          - not_null

      - name: campaign_name
        description: "Campaign name."
        tests:
          - not_null

      - name: ads_cost
        description: "Advertising cost of the campaign."
        tests:
          - not_null

      - name: impression
        description: "Number of impressions."
        tests:
          - not_null

      - name: click
        description: "Number of clicks."
        tests:
          - not_null

  - name: int_campaigns_day
    description: Daily aggregated campaign metrics.
    columns:
      - name: date_date
        description: Campaign date.
        tests:
          - unique
          - not_null

      - name: ads_cost
        description: Total advertising cost per day.
        tests:
          - not_null

      - name: impression
        description: Total number of impressions per day.
        tests:
          - not_null

      - name: click
        description: Total number of clicks per day.
        tests:
          - not_null

  - name: finance_campaigns_day
    description: Daily finance mart enriched with advertising campaign metrics.
    columns:
      - name: date
        description: Date of the financial and advertising metrics.
        tests:
          - unique
          - not_null

      - name: ads_margin
        description: Operational margin after advertising costs.
        tests:
          - not_null

      - name: average_basket
        description: Average basket value.
        tests:
          - not_null

      - name: operational_margin
        description: Daily operational margin.
        tests:
          - not_null

      - name: ads_cost
        description: Daily advertising cost.
        tests:
          - not_null

      - name: ads_impression
        description: Daily number of ad impressions.
        tests:
          - not_null

      - name: ads_clicks
        description: Daily number of ad clicks.
        tests:
          - not_null

      - name: quantity
        description: Daily quantity of products sold.
        tests:
          - not_null

      - name: revenue
        description: Daily revenue.
        tests:
          - not_null

      - name: purchase_cost
        description: Daily purchase cost.
        tests:
          - not_null

      - name: margin
        description: Daily margin before shipping and advertising costs.
        tests:
          - not_null

      - name: shipping_fee
        description: Daily shipping fees paid by customers.
        tests:
          - not_null

      - name: log_cost
        description: Daily logistics cost.
        tests:
          - not_null

      - name: ship_cost
        description: Daily shipping cost paid by the company.
        tests:
          - not_null
 




