version: 2

sources:
  - name: raw
    database: proje1-493409
    schema: GZrawData

    tables:
      - name: sales
        identifier: raw_gz_sales
        description: sales of Greenweez / we have on row per product_id found in each orders_id
        columns:
          - name: date_date
            description: date of purchase
          - name: orders_id
            description: Unique order identifier
          - name: pdt_id
            description: Product identifier
          - name: revenue
            description: Revenue generated by the order
          - name: quantity
            description: Quantity of products sold
        tests:
          - unique:
              column_name: "(orders_id || '-' || pdt_id)"

      - name: product
        identifier: raw_gz_product
        description: Products of Greenweez
        columns:
          - name: products_id
            description: Primary Key
            tests:
              - unique
              - not_null
          - name: purchase_price
            description: Purchase price of the product

      - name: ship
        identifier: raw_gz_ship
        description: Raw shipping data for the Greenweez orders
        columns:
          - name: orders_id
            description: Primary Key
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: Shipping fee charged to the customer
          - name: logcost
            description: Logistics cost related to shipping
          - name: ship_cost
            description: Shipping cost for each order paid by the company
